name: CI
on:
  pull_request:
  push:
  schedule:
  - cron: '0 0 * * 4'
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-java@v5
      with:
        java-version: 17
        distribution: temurin
    - uses: sbt/setup-sbt@v1
    - uses: coursier/cache-action@v8
    - run: sbt
           -v
           --server
           "all scalafmtCheckAll scalafmtSbtCheck"
           test
